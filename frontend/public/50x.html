<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digifort Labs - System Maintenance</title>
    <style>
        body {
            background-color: #020617; /* Slate-950 */
            color: #cbd5e1; /* Slate-300 */
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
            background: rgba(15, 23, 42, 0.5); /* Slate-900 */
            border: 1px solid rgba(51, 65, 85, 0.5); /* Slate-700 */
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: inline-block;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 16px;
            font-weight: 700;
        }
        p {
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .loader {
            width: 100%;
            height: 4px;
            background: #1e293b;
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }
        .loader::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background: #3b82f6; /* Blue-500 */
            border-radius: 99px;
            animation: load 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes load {
            0% { left: -30%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🛡️</div>
        <h1>System Update in Progress</h1>
        <p>Digifort Labs is currently upgrading its secure infrastructure. <br>Access to the records portal is temporarily paused.</p>
        
        <div class="loader"></div>
        <p style="font-size: 12px; margin-top: 24px; color: #64748b;">Status Code: 502 / Bad Gateway</p>
    </div>
    <script>
        // Auto-refresh every 30 seconds to check if back online
        setTimeout(function() {
            window.location.reload();
        }, 30000);
    </script>
</body>
</html>
